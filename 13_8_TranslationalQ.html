<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1D Translational Partition Function</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@500;800&display=swap');
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            display: flex; align-items: flex-start; justify-content: center;
            min-height: 100vh; overflow-y: auto;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%; height: 6px;
            background: #334155;
            border-radius: 3px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            background: #60a5fa;
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            transition: background 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            background: #93c5fd;
        }
        
        .math-font { font-family: 'JetBrains Mono', monospace; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        Chart.register(
            Chart.CategoryScale, Chart.LinearScale, Chart.PointElement, 
            Chart.LineElement, Chart.BarElement, Chart.Title, 
            Chart.Tooltip, Chart.Legend, Chart.Filler
        );

        const App = () => {
            // Updated default values: T = 300K, mass = 4 (integer)
            const [temp, setTemp] = useState(300); 
            const [mass, setMass] = useState(4); 
            const [length, setLength] = useState(1.0); // nm
            const [xAxisMode, setXAxisMode] = useState('n'); // 'n' or 'energy'

            const h = 6.626e-34;
            const k = 1.381e-23;
            const amu = 1.6605e-27;
            const nm = 1e-9;

            const m_kg = mass * amu;
            const X_m = length * nm;
            const beta = 1 / (k * temp);

            const epsilon = useMemo(() => {
                return (h * h) / (8 * m_kg * X_m * X_m);
            }, [m_kg, X_m]);

            const thermalWavelength = useMemo(() => {
                return h / Math.sqrt(2 * Math.PI * m_kg * k * temp);
            }, [m_kg, temp]);

            const qIntegral = X_m / thermalWavelength;

            const qSum = useMemo(() => {
                let sum = 0;
                const limit = 100000; 
                for (let n = 1; n <= limit; n++) {
                    const term = Math.exp(-(n * n - 1) * beta * epsilon);
                    sum += term;
                    if (term < 1e-7) break; 
                }
                return sum;
            }, [beta, epsilon]);

            const errorPercent = Math.abs((qIntegral - qSum) / qSum) * 100;

            const chartData = useMemo(() => {
                const maxN = Math.max(5, Math.ceil(qIntegral * 3.5));
                const discretePoints = [];
                const continuousPoints = [];
                
                if (xAxisMode === 'n') {
                    const step = Math.max(1, Math.floor(maxN / 800)); 
                    for (let n = 1; n <= maxN; n += step) {
                        const val = Math.exp(-(n * n - 1) * beta * epsilon);
                        discretePoints.push({ x: n, y: val });
                    }
                    
                    const stepCont = maxN / 200;
                    for (let x = 0; x <= maxN; x += stepCont) {
                        const val = Math.exp(-(x * x) * beta * epsilon);
                        continuousPoints.push({ x: x, y: val });
                    }
                    return { discretePoints, continuousPoints, maxX: maxN, xLabel: 'Quantum Number (n)' };
                } else {
                    const energyScale = 1e21; 
                    const maxEnergy_abs = (maxN * maxN) * epsilon * energyScale;
                    const step = Math.max(1, Math.floor(maxN / 800));
                    
                    for (let n = 1; n <= maxN; n += step) {
                        const E_abs = (n * n - 1) * epsilon;
                        const val = Math.exp(-E_abs * beta);
                        discretePoints.push({ x: E_abs * energyScale, y: val });
                    }
                    
                    const stepCont = maxEnergy_abs / 200;
                    for (let e = 0; e <= maxEnergy_abs; e += stepCont) {
                        const val = Math.exp(-(e / energyScale) * beta);
                        continuousPoints.push({ x: e, y: val });
                    }
                    return { discretePoints, continuousPoints, maxX: maxEnergy_abs, xLabel: 'Absolute Energy (E / zJ)' };
                }
            }, [beta, epsilon, qIntegral, xAxisMode]);

            const chartRef = useRef(null);

            useEffect(() => {
                const ctx = chartRef.current.getContext('2d');
                if (chartRef.current.chartInstance) chartRef.current.chartInstance.destroy();

                chartRef.current.chartInstance = new Chart(ctx, {
                    data: {
                        datasets: [
                            {
                                type: 'bar',
                                label: 'Discrete States (Σ)',
                                data: chartData.discretePoints,
                                backgroundColor: xAxisMode === 'n' ? 'rgba(59, 130, 246, 0.8)' : 'rgba(139, 92, 246, 0.8)', 
                                borderColor: 'transparent',
                                borderWidth: 0,
                                barThickness: 1.2,
                                maxBarThickness: 2,
                                order: 2
                            },
                            {
                                type: 'line',
                                label: 'Boltzmann Decay (∫)',
                                data: chartData.continuousPoints,
                                borderColor: '#f43f5e',
                                backgroundColor: 'transparent',
                                borderWidth: 3,
                                fill: false,
                                pointRadius: 0,
                                tension: 0.4,
                                order: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: { duration: 400, easing: 'easeOutQuad' },
                        plugins: {
                            legend: { 
                                position: 'top', 
                                labels: { 
                                    color: '#cbd5e1', 
                                    font: { family: 'Inter', weight: 'bold' },
                                    usePointStyle: true,
                                    pointStyle: 'line'
                                } 
                            },
                            tooltip: { enabled: false }
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                position: 'bottom',
                                min: 0,
                                max: chartData.maxX,
                                title: { display: true, text: chartData.xLabel, color: '#94a3b8', font: { weight: 'bold' } },
                                grid: { color: '#1e293b' },
                                ticks: { color: '#64748b', maxTicksLimit: 10 }
                            },
                            y: {
                                min: 0,
                                max: 1.1,
                                title: { display: true, text: 'Boltzmann Factor', color: '#94a3b8', font: { weight: 'bold' } },
                                grid: { color: '#1e293b' },
                                ticks: { color: '#64748b' }
                            }
                        }
                    }
                });

                return () => {
                    if (chartRef.current && chartRef.current.chartInstance) {
                        chartRef.current.chartInstance.destroy();
                    }
                };
            }, [chartData, xAxisMode]);

            const isClassical = X_m > 5 * thermalWavelength;

            return (
                <div className="w-[1280px] min-h-[720px] bg-[#0b1120] text-slate-200 flex flex-col relative border border-slate-800 rounded-2xl shadow-2xl my-8 overflow-hidden">
                    
                    <header className="h-[90px] bg-slate-900 border-b border-slate-800 px-8 flex items-center justify-between shrink-0">
                        <div>
                            <h1 className="text-2xl font-black text-white tracking-tight uppercase">Translational Partition Function</h1>
                            <p className="text-xs text-sky-400 font-bold uppercase tracking-[0.2em] mt-1">Discrete Lines Forming a Continuous Plane</p>
                        </div>
                    </header>

                    <div className="flex-1 flex p-6 gap-6 bg-[#0f172a]">
                        
                        <aside className="w-[320px] flex flex-col gap-6 shrink-0">
                            <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">System Parameters</h2>
                                <div className="space-y-8">
                                    <ControlSlider label="Temperature (T)" unit="K" min={10} max={5000} step={10} value={temp} onChange={setTemp} color="bg-rose-500" />
                                    {/* Updated Step to 1 for integer-only values */}
                                    <ControlSlider label="Particle Mass (m)" unit="amu" min={1} max={100} step={1} value={mass} onChange={setMass} color="bg-sky-500" />
                                    <ControlSlider label="Box Length (X)" unit="nm" min={0.1} max={10.0} step={0.1} value={length} onChange={setLength} color="bg-emerald-500" />
                                </div>
                            </div>

                            <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 flex-1 flex flex-col text-center">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Calculation Results</h2>
                                
                                <div className="space-y-4">
                                    <ResultBox label="Discrete Sum (Exact)" value={qSum.toLocaleString(undefined, {maximumFractionDigits: 1})} highlight="text-sky-400" />
                                    <ResultBox label="Integral Approx." value={qIntegral.toLocaleString(undefined, {maximumFractionDigits: 1})} highlight="text-rose-400" />
                                    
                                    <div className="pt-4 border-t border-slate-700 text-left">
                                        <div className="flex justify-between items-end">
                                            <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Error Rate</span>
                                            <span className={`text-xl font-mono font-black ${errorPercent < 1 ? 'text-emerald-400' : 'text-amber-400'}`}>
                                                {errorPercent.toFixed(3)}%
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        <main className="flex-1 flex flex-col gap-6 min-w-0">
                            
                            <div className="bg-slate-900 rounded-2xl p-4 border border-slate-800 flex justify-around items-center shrink-0 shadow-inner">
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Discrete Sum</div>
                                    <div className="math-font text-sky-400 text-sm italic">q = Σ exp(-(n²-1)βε)</div>
                                </div>
                                <div className="text-slate-600 font-bold text-xl">≅</div>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Continuous Integral</div>
                                    <div className="math-font text-rose-400 text-sm italic">q = ∫ exp(-x²βε) dx</div>
                                </div>
                                <div className="text-slate-600 font-bold text-xl">=</div>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Final Approximation</div>
                                    <div className="math-font text-white text-sm italic underline decoration-sky-500 underline-offset-4 font-bold">X / Λ</div>
                                </div>
                            </div>

                            <div className="bg-slate-900 rounded-2xl p-6 border border-slate-800 flex-1 relative flex flex-col shadow-inner">
                                <div className="flex justify-between items-start mb-4">
                                    <div className="max-w-[500px]">
                                        <p className="text-[11px] text-slate-400 italic leading-relaxed">
                                            Each <strong className="text-sky-400 not-italic">Discrete State (Line)</strong> represents a specific quantum level. As Temperature or Box Length increases, these lines become so dense that they <strong className="text-white not-italic">gather to form a solid blue plane</strong>, matching the continuous <strong className="text-rose-400 not-italic">Boltzmann Integral curve</strong>.
                                        </p>
                                    </div>
                                    
                                    <div className="flex bg-slate-800 rounded-lg p-1 border border-slate-700 shrink-0 shadow-sm">
                                        <button 
                                            onClick={() => setXAxisMode('n')}
                                            className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${xAxisMode === 'n' ? 'bg-sky-500 text-slate-900 shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                                        >
                                            vs. Quantum Number (n)
                                        </button>
                                        <button 
                                            onClick={() => setXAxisMode('energy')}
                                            className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${xAxisMode === 'energy' ? 'bg-purple-500 text-slate-900 shadow-sm' : 'text-slate-400 hover:text-slate-200'}`}
                                        >
                                            vs. Absolute Energy (E)
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 relative mt-4">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>

                            <div className={`rounded-2xl p-5 border flex items-center justify-between shrink-0 transition-colors duration-500 ${isClassical ? 'bg-emerald-900/20 border-emerald-500/30' : 'bg-amber-900/20 border-amber-500/30'}`}>
                                <div className="flex gap-10">
                                    <div>
                                        <p className="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-1">Box Length (X)</p>
                                        <p className="math-font text-lg text-white">{(X_m * 1e9).toFixed(3)} nm</p>
                                    </div>
                                    <div>
                                        <p className="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-1">Thermal Wavelength (Λ)</p>
                                        <p className="math-font text-lg text-white">{(thermalWavelength * 1e9).toFixed(4)} nm</p>
                                    </div>
                                </div>
                                
                                <div className="text-right">
                                    <p className="text-[10px] uppercase font-black tracking-widest mb-1 text-slate-400">Classical Validity (X ≫ Λ)</p>
                                    <p className={`text-sm font-black uppercase tracking-wider ${isClassical ? 'text-emerald-400' : 'text-amber-400'}`}>
                                        {isClassical ? 'Continuous Regime' : 'Quantum Discrete Regime'}
                                    </p>
                                </div>
                            </div>

                        </main>
                    </div>
                </div>
            );
        };

        const ControlSlider = ({ label, unit, min, max, step = 1, value, onChange, color }) => (
            <div className="group">
                <div className="flex justify-between mb-3">
                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest group-hover:text-white transition-colors">{label}</label>
                    <span className="text-xs font-mono font-bold text-white bg-slate-900 border border-slate-700 px-2 py-0.5 rounded shadow-inner">{value} {unit}</span>
                </div>
                <div className="relative h-2 bg-slate-900 rounded-full overflow-hidden border border-slate-700">
                    <div className={`absolute top-0 left-0 h-full ${color} opacity-80 pointer-events-none`} style={{ width: `${((value - min) / (max - min)) * 100}%` }}></div>
                    <input 
                        type="range" min={min} max={max} step={step} value={value} 
                        onChange={(e) => onChange(parseFloat(e.target.value))}
                        className="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10"
                    />
                    <input 
                        type="range" min={min} max={max} step={step} value={value} 
                        readOnly
                        className="w-full relative z-0"
                    />
                </div>
            </div>
        );

        const ResultBox = ({ label, value, highlight }) => (
            <div className="flex justify-between items-end pb-2 border-b border-slate-700/50">
                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{label}</span>
                <span className={`text-2xl font-mono font-black ${highlight}`}>{value}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
