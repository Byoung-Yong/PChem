<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intuitive Partition Function</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@500;800&display=swap');
        
        body { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            display: flex; align-items: flex-start; justify-content: center;
            min-height: 100vh; overflow-y: auto;
        }

        /* Smooth Slider Customization */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%; height: 8px;
            background: linear-gradient(to right, #3b82f6, #ef4444);
            border-radius: 4px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px; height: 24px;
            background: #ffffff;
            border-radius: 50%; cursor: pointer;
            border: 3px solid #0f172a;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Keyframe Animations */
        @keyframes moveLeftRight {
            0% { transform: translateX(-30px); }
            100% { transform: translateX(30px); }
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        @keyframes vibrate1 {
            0% { transform: translateX(10px); }
            100% { transform: translateX(-10px); }
        }
        @keyframes vibrate2 {
            0% { transform: translateX(-10px); }
            100% { transform: translateX(10px); }
        }
        
        .math-font { font-family: 'JetBrains Mono', monospace; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [temp, setTemp] = useState(50); // Temp scale 1 to 100

            // Beta (1/kT approximation)
            const beta = useMemo(() => {
                const t = Math.max(temp, 1);
                return 10 / t; 
            }, [temp]);

            // Realistically spaced Energy Levels
            // Translation: e ~ n^2 (Particle in a box)
            // Rotation: e ~ J(J+1) (Rigid rotor)
            // Vibration: e ~ n (Harmonic oscillator)
            // Electronic: Large gaps
            const energies = {
                trans: Array.from({length: 30}, (_, i) => i * i * 0.015),
                rot:   Array.from({length: 20}, (_, i) => i * (i + 1) * 0.15),
                vib:   Array.from({length: 15}, (_, i) => i * 3.0),
                elec:  [0, 25, 50]
            };

            const calcQ = (levels) => levels.reduce((sum, e) => sum + Math.exp(-beta * e), 0);

            const qT = useMemo(() => calcQ(energies.trans), [beta]);
            const qR = useMemo(() => calcQ(energies.rot), [beta]);
            const qV = useMemo(() => calcQ(energies.vib), [beta]);
            const qE = useMemo(() => calcQ(energies.elec), [beta]);
            const qTotal = qT * qR * qV * qE;

            // Dynamics based on Temp
            const tSpeed = Math.max(0.1, 2 - (temp / 50));
            const rSpeed = Math.max(0.2, 3 - (temp / 30));
            const vSpeed = Math.max(0.1, 1 - (temp / 100));
            const vAmp = temp / 100;
            const eProb = Math.exp(-beta * 25); 

            return (
                <div className="w-[1280px] min-h-[850px] bg-[#0b1120] text-slate-200 flex flex-col relative border border-slate-700 rounded-2xl shadow-2xl my-8">
                    
                    {/* Header */}
                    <header className="h-[100px] bg-slate-900 border-b border-slate-800 px-8 flex items-center gap-8 shrink-0">
                        <div className="flex-1">
                            <h1 className="text-2xl font-black text-white tracking-tight uppercase">Molecular Partition Function</h1>
                            <p className="text-xs text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Realistic Energy Spacing & Boltzmann Distribution</p>
                        </div>
                        
                        <div className="w-[500px] bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-inner flex flex-col justify-center">
                            <div className="flex justify-between items-end mb-2">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest">Temperature (T)</span>
                                <span className="text-xl font-black text-white math-font">{temp} K</span>
                            </div>
                            <input 
                                type="range" min="1" max="100" value={temp} 
                                onChange={(e) => setTemp(parseInt(e.target.value))}
                            />
                        </div>
                    </header>

                    {/* 4 Energy Modes */}
                    <div className="flex-1 p-6 grid grid-cols-4 gap-6 bg-[#0f172a]">
                        
                        <EnergyModeCard 
                            title="Translational"
                            subtitle="Continuum-like steps"
                            color="text-sky-400" bgColor="bg-sky-500" border="border-sky-500/30"
                            qValue={qT}
                            levels={energies.trans} beta={beta}
                        >
                            <svg className="w-full h-full" viewBox="0 0 100 100">
                                <rect x="10" y="30" width="80" height="40" fill="none" stroke="#334155" strokeWidth="2" strokeDasharray="4 4" />
                                <circle cx="50" cy="50" r="8" fill="#38bdf8" 
                                    style={{ animation: `moveLeftRight ${tSpeed}s infinite alternate ease-in-out` }} />
                            </svg>
                        </EnergyModeCard>

                        <EnergyModeCard 
                            title="Rotational"
                            subtitle="J(J+1) spacing"
                            color="text-emerald-400" bgColor="bg-emerald-500" border="border-emerald-500/30"
                            qValue={qR}
                            levels={energies.rot} beta={beta}
                        >
                            <svg className="w-full h-full" viewBox="0 0 100 100">
                                <g style={{ animation: `spin ${rSpeed}s infinite linear`, transformOrigin: '50% 50%' }}>
                                    <line x1="30" y1="50" x2="70" y2="50" stroke="#94a3b8" strokeWidth="4" />
                                    <circle cx="30" cy="50" r="10" fill="#34d399" />
                                    <circle cx="70" cy="50" r="10" fill="#34d399" />
                                </g>
                                <circle cx="50" cy="50" r="40" fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="2 4" />
                            </svg>
                        </EnergyModeCard>

                        <EnergyModeCard 
                            title="Vibrational"
                            subtitle="Equal n spacing"
                            color="text-amber-400" bgColor="bg-amber-500" border="border-amber-500/30"
                            qValue={qV}
                            levels={energies.vib} beta={beta}
                        >
                            <svg className="w-full h-full" viewBox="0 0 100 100">
                                <path d="M 25 50 Q 30 20, 35 50 T 45 50 T 55 50 T 65 50 T 75 50" fill="none" stroke="#94a3b8" strokeWidth="2" 
                                    style={{ transformOrigin: '50% 50%', transform: `scaleX(${1 + vAmp*0.3})` }} />
                                <circle cx="20" cy="50" r="12" fill="#fbbf24" style={{ animation: `vibrate1 ${vSpeed}s infinite alternate ease-in-out` }} />
                                <circle cx="80" cy="50" r="12" fill="#fbbf24" style={{ animation: `vibrate2 ${vSpeed}s infinite alternate ease-in-out` }} />
                            </svg>
                        </EnergyModeCard>

                        <EnergyModeCard 
                            title="Electronic"
                            subtitle="Extreme gaps"
                            color="text-rose-400" bgColor="bg-rose-500" border="border-rose-500/30"
                            qValue={qE}
                            levels={energies.elec} beta={beta}
                        >
                            <svg className="w-full h-full" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="6" fill="#fb7185" />
                                <circle cx="50" cy="50" r="20" fill="none" stroke="#4c0519" strokeWidth="2" />
                                <circle cx="70" cy="50" r="4" fill="#f43f5e" style={{ opacity: 1 - eProb, animation: `spin 1.5s infinite linear`, transformOrigin: '50% 50%' }} />
                                <circle cx="50" cy="50" r="38" fill="none" stroke="#4c0519" strokeWidth="2" strokeDasharray="4 4" />
                                <circle cx="88" cy="50" r="4" fill="#fda4af" style={{ opacity: eProb, animation: `spin 0.8s infinite linear`, transformOrigin: '50% 50%' }} />
                            </svg>
                        </EnergyModeCard>

                    </div>

                    {/* Formula Area */}
                    <footer className="h-[160px] bg-slate-900 border-t border-slate-800 p-6 flex flex-col items-center justify-center shrink-0">
                        <div className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-4">Total Microstates Capacity</div>
                        
                        <div className="flex items-center gap-6 math-font text-3xl font-black">
                            <span className="text-white font-black">q<sub>total</sub></span>
                            <span className="text-slate-500">=</span>
                            
                            <div className="flex items-center gap-4 bg-slate-800/50 px-6 py-3 rounded-2xl border border-slate-700 shadow-inner">
                                <Factor value={qT} label="q_T" color="text-sky-400" />
                                <span className="text-slate-600 text-xl">×</span>
                                <Factor value={qR} label="q_R" color="text-emerald-400" />
                                <span className="text-slate-600 text-xl">×</span>
                                <Factor value={qV} label="q_V" color="text-amber-400" />
                                <span className="text-slate-600 text-xl">×</span>
                                <Factor value={qE} label="q_E" color="text-rose-400" />
                            </div>

                            <span className="text-slate-500">=</span>
                            <div className="bg-indigo-600 text-white px-8 py-3 rounded-2xl shadow-[0_0_30px_rgba(79,70,229,0.4)]">
                                {qTotal.toLocaleString(undefined, { maximumFractionDigits: 0 })}
                            </div>
                        </div>
                    </footer>

                </div>
            );
        };

        const Factor = ({ value, label, color }) => (
            <div className="flex flex-col items-center">
                <span className={`${color} min-w-[70px] text-center uppercase`}>{value.toFixed(1)}</span>
                <span className="text-[10px] text-slate-500 uppercase mt-1 tracking-widest">{label}</span>
            </div>
        );

        const EnergyModeCard = ({ title, subtitle, color, bgColor, border, qValue, levels, beta, children }) => {
            const pops = levels.map(e => Math.exp(-beta * e));
            const maxPop = pops[0];
            
            // To visualize spacing, we define a viewport energy range
            // We use the maximum level in the array to scale the Y axis.
            const maxEnergy = Math.max(...levels);

            return (
                <div className={`bg-slate-800/50 border ${border} rounded-2xl p-5 flex flex-col h-full shadow-lg relative overflow-hidden group hover:bg-slate-800 transition-colors`}>
                    
                    <div className="mb-4">
                        <h2 className={`text-lg font-black ${color} tracking-tight uppercase`}>{title}</h2>
                        <p className="text-[10px] text-slate-400 uppercase tracking-widest">{subtitle}</p>
                    </div>

                    <div className="h-[100px] bg-slate-900 rounded-xl mb-4 flex items-center justify-center border border-slate-700/50 shadow-inner overflow-hidden shrink-0">
                        {children}
                    </div>

                    {/* Realistic Ladder: Energy Value mapped to Y-coordinate */}
                    <div className="flex-1 relative bg-slate-900/50 rounded-xl p-3 border border-slate-700/30 overflow-hidden">
                        <div className="text-[9px] text-slate-500 uppercase font-bold absolute top-2 left-3 right-3 flex justify-between z-10">
                            <span>Energy Levels (ε)</span>
                            <span>Population</span>
                        </div>
                        
                        <div className="relative w-full h-[320px] mt-6">
                            {levels.map((e, idx) => {
                                const popRatio = pops[idx] / maxPop;
                                // Map energy value to 0-100% height (offset from bottom)
                                const bottomPercent = (e / maxEnergy) * 90; 

                                // Optimization: Only render if energy is within view or population is significant
                                if (popRatio < 0.002 && idx > 5) return null; 
                                
                                return (
                                    <div 
                                        key={idx} 
                                        className="absolute left-0 w-full flex items-center gap-3 transition-all duration-700 ease-out"
                                        style={{ bottom: `${bottomPercent}%` }}
                                    >
                                        <div className="w-8 text-right text-[8px] text-slate-600 math-font font-bold shrink-0">
                                            ε<sub>{idx}</sub>
                                        </div>
                                        <div className="flex-1 h-[2px] bg-slate-800/50 relative">
                                            {/* Energy Level Line */}
                                            <div className="absolute top-0 left-0 w-full h-full bg-slate-700/30"></div>
                                            
                                            {/* Population Bar (Boltzmann distribution) */}
                                            <div 
                                                className={`absolute top-[-2px] left-0 h-[6px] ${bgColor} rounded-full shadow-[0_0_8px_rgba(255,255,255,0.1)]`}
                                                style={{ 
                                                    width: `${popRatio * 100}%`,
                                                    transition: 'width 0.3s ease-in-out'
                                                }}
                                            />
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="mt-4 flex justify-between items-baseline border-t border-slate-700/50 pt-3 shrink-0">
                        <span className="text-[10px] font-black text-slate-400 tracking-widest uppercase">q_mode =</span>
                        <span className={`text-2xl font-black ${color} math-font`}>{qValue.toFixed(2)}</span>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
