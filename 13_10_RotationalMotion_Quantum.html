<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Dynamics - Rotational Quantum</title>
    
    <!-- External Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body { 
            background-color: #020617; 
            margin: 0; 
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Slider Styling */
        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 5px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #38bdf8;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        /**
         * KaTeX Helper Component
         */
        const Katex = ({ tex, display = false, fontSize = "1.1rem" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.katex && containerRef.current) {
                    try {
                        window.katex.render(tex, containerRef.current, {
                            displayMode: display,
                            throwOnError: false,
                        });
                    } catch (e) {
                        containerRef.current.textContent = tex;
                    }
                }
            }, [tex, display]);
            return <span ref={containerRef} style={{ fontSize }} />;
        };

        const App = () => {
            const [j, setJ] = useState(2);
            const [mj, setMj] = useState(1);
            const [isAutoPrecess, setIsAutoPrecess] = useState(true);
            const [isVectorLocked, setIsVectorLocked] = useState(false);
            const [precessionPhase, setPrecessionPhase] = useState(0);
            const [spinPhase, setSpinPhase] = useState(0);

            const canvasRef = useRef(null);

            // --- Physical State Definitions ---
            const q_L_mag = useMemo(() => Math.sqrt(j * (j + 1)), [j]);
            const q_Lz = mj;
            const thetaRad = useMemo(() => (j === 0 ? 0 : Math.acos(q_Lz / (q_L_mag || 1))), [j, q_Lz, q_L_mag]);
            const thetaDeg = (thetaRad * 180) / Math.PI;

            const mjValues = useMemo(() => {
                const vals = [];
                for (let m = j; m >= -j; m--) vals.push(m);
                return vals;
            }, [j]);

            // --- Animation Engine ---
            useEffect(() => {
                let frameId;
                let lastTime = performance.now();
                const tick = (time) => {
                    const dt = (time - lastTime) / 1000;
                    lastTime = time;
                    if (isAutoPrecess) {
                        if (!isVectorLocked) setPrecessionPhase((p) => (p + dt * 1.2) % (Math.PI * 2));
                        setSpinPhase((p) => (p + dt * 4.5) % (Math.PI * 2));
                    }
                    frameId = requestAnimationFrame(tick);
                };
                frameId = requestAnimationFrame(tick);
                return () => cancelAnimationFrame(frameId);
            }, [isAutoPrecess, isVectorLocked]);

            // --- 3D Rendering (Canvas) ---
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();

                if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                }

                ctx.save();
                ctx.scale(dpr, dpr);
                const w = rect.width;
                const h = rect.height;
                const cx = w / 2;
                const cy = h / 2;
                ctx.clearRect(0, 0, w, h);

                const project = (x, y, z) => {
                    const perspective = 1000 / (1000 + y); 
                    return { x: cx + x * perspective, y: cy - z * perspective, depth: y, scale: perspective };
                };

                const phi = isVectorLocked ? 0 : precessionPhase;
                const th = thetaRad;
                const psi = spinPhase;

                const rotatePoint = (px, py, pz, applySpin = true) => {
                    let x1 = applySpin ? (px * Math.cos(psi) - py * Math.sin(psi)) : px;
                    let y1 = applySpin ? (px * Math.sin(psi) + py * Math.cos(psi)) : py;
                    let z1 = pz;
                    let x2 = x1 * Math.cos(th) + z1 * Math.sin(th);
                    let y2 = y1;
                    let z2 = -x1 * Math.sin(th) + z1 * Math.cos(th);
                    let x3 = x2 * Math.cos(phi) - y2 * Math.sin(phi);
                    let y3 = x2 * Math.sin(phi) + y2 * Math.cos(phi);
                    let z3 = z2;
                    return { x: x3, y: y3, z: z3 };
                };

                const sphereRadius = 180;

                // --- Sphere Drawing with Lat/Lon ---
                const drawEnhancedSphere = () => {
                    const steps = 12; 
                    const res = 72;

                    const drawGridPass = (isFront) => {
                        ctx.lineWidth = 0.5;
                        const baseOpacity = isFront ? 0.2 : 0.05;

                        // Latitude
                        for (let i = 1; i < steps; i++) {
                            const lat = (i / steps) * Math.PI;
                            ctx.beginPath();
                            let started = false;
                            for (let k = 0; k <= res; k++) {
                                const lon = (k / res) * Math.PI * 2;
                                const x = sphereRadius * Math.sin(lat) * Math.cos(lon);
                                const y = sphereRadius * Math.sin(lat) * Math.sin(lon);
                                const z = sphereRadius * Math.cos(lat);
                                const p = project(x, y, z);
                                const visibility = isFront ? (p.depth > 0) : (p.depth <= 0);
                                if (visibility) {
                                    if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                                    else ctx.lineTo(p.x, p.y);
                                } else started = false;
                            }
                            ctx.strokeStyle = `rgba(186, 230, 253, ${baseOpacity})`;
                            ctx.stroke();
                        }

                        // Longitude
                        for (let i = 0; i < steps; i++) {
                            const lon = (i / steps) * Math.PI * 2;
                            ctx.beginPath();
                            let started = false;
                            for (let k = 0; k <= res; k++) {
                                const lat = (k / res) * Math.PI;
                                const x = sphereRadius * Math.sin(lat) * Math.cos(lon);
                                const y = sphereRadius * Math.sin(lat) * Math.sin(lon);
                                const z = sphereRadius * Math.cos(lat);
                                const p = project(x, y, z);
                                const visibility = isFront ? (p.depth > 0) : (p.depth <= 0);
                                if (visibility) {
                                    if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                                    else ctx.lineTo(p.x, p.y);
                                } else started = false;
                            }
                            ctx.strokeStyle = `rgba(186, 230, 253, ${baseOpacity})`;
                            ctx.stroke();
                        }
                    };

                    drawGridPass(false);
                    const grad = ctx.createRadialGradient(cx - sphereRadius * 0.3, cy - sphereRadius * 0.3, sphereRadius * 0.1, cx, cy, sphereRadius);
                    grad.addColorStop(0, 'rgba(30, 58, 138, 0.2)');
                    grad.addColorStop(1, 'rgba(2, 6, 23, 0.7)');
                    ctx.beginPath(); ctx.arc(cx, cy, sphereRadius, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
                    drawGridPass(true);
                };

                drawEnhancedSphere();

                // --- Rigid Rotor Orbit ---
                const orbitSegments = 100;
                const orbitPoints = [];
                for (let i = 0; i <= orbitSegments; i++) {
                    const alpha = (i / orbitSegments) * Math.PI * 2;
                    const pt = rotatePoint(sphereRadius * Math.cos(alpha), sphereRadius * Math.sin(alpha), 0, false);
                    orbitPoints.push({ ...pt, ...project(pt.x, pt.y, pt.z) });
                }

                // 1. Orbit Plane Fill (Amber) - FILL RE-ENABLED for Canvas as requested
                ctx.beginPath();
                orbitPoints.forEach((p, i) => {
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.closePath();
                ctx.fillStyle = 'rgba(251, 191, 36, 0.22)'; 
                ctx.fill();

                // 2. Orbit Path Stroke
                ctx.lineWidth = 4;
                for (let i = 0; i < orbitSegments; i++) {
                    const p1 = orbitPoints[i];
                    const p2 = orbitPoints[i+1];
                    const opacity = 0.5 + Math.max(0, (p1.depth + sphereRadius) / (sphereRadius*2)) * 0.5;
                    ctx.strokeStyle = `rgba(251, 191, 36, ${opacity})`; // Amber-400
                    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }

                // --- Atoms and Bond ---
                const atomRel1 = rotatePoint(sphereRadius, 0, 0, true);
                const atomRel2 = rotatePoint(-sphereRadius, 0, 0, true);
                const atom1 = { ...atomRel1, label: 'H', color: '#f1f5f9', size: 26 };
                const atom2 = { ...atomRel2, label: 'Cl', color: '#22c55e', size: 52 };
                const p1 = project(atom1.x, atom1.y, atom1.z);
                const p2 = project(atom2.x, atom2.y, atom2.z);
                const pOrigin = project(0, 0, 0);

                // --- Angular Momentum Vector L ---
                const arrowLen = sphereRadius; 
                const vecLx = arrowLen * Math.sin(th) * Math.cos(phi);
                const vecLy = arrowLen * Math.sin(th) * Math.sin(phi);
                const vecLz = arrowLen * Math.cos(th);
                const lEnd = project(vecLx, vecLy, vecLz);

                ctx.beginPath(); ctx.moveTo(pOrigin.x, pOrigin.y); ctx.lineTo(lEnd.x, lEnd.y);
                ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 6; ctx.stroke();
                const headLen = 22;
                const ang = Math.atan2(lEnd.y - pOrigin.y, lEnd.x - pOrigin.x);
                ctx.beginPath();
                ctx.moveTo(lEnd.x, lEnd.y);
                ctx.lineTo(lEnd.x - headLen * Math.cos(ang - Math.PI/7), lEnd.y - headLen * Math.sin(ang - Math.PI/7));
                ctx.lineTo(lEnd.x - headLen * Math.cos(ang + Math.PI/7), lEnd.y - headLen * Math.sin(ang + Math.PI/7));
                ctx.closePath(); ctx.fillStyle = '#38bdf8'; ctx.fill();

                // Sort and Render atoms
                const renderList = [
                    { type: 'atom', p: p1, data: atom1 },
                    { type: 'atom', p: p2, data: atom2 },
                    { type: 'bond', p1, p2, depth: (p1.depth + p2.depth) / 2 }
                ];
                renderList.sort((a, b) => (b.p?.depth || b.depth) - (a.p?.depth || a.depth));
                renderList.forEach((el) => {
                    if (el.type === 'bond') {
                        ctx.beginPath(); ctx.moveTo(el.p1.x, el.p1.y); ctx.lineTo(el.p2.x, el.p2.y);
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 18 * el.p1.scale; 
                        ctx.lineCap = "round"; ctx.stroke();
                    } else {
                        const { p, data } = el;
                        let r = data.size * p.scale;
                        const grad = ctx.createRadialGradient(p.x - r * 0.3, p.y - r * 0.3, r * 0.1, p.x, p.y, r);
                        grad.addColorStop(0, '#fff'); grad.addColorStop(0.4, data.color); grad.addColorStop(1, '#000');
                        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
                        ctx.fillStyle = "white"; ctx.font = `bold ${r * 0.45}px Inter`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                        ctx.fillText(data.label, p.x, p.y);
                    }
                });
                ctx.restore();
            }, [j, mj, precessionPhase, spinPhase, q_L_mag, thetaRad, isVectorLocked]);

            return (
                <div className="flex flex-col gap-6 w-full max-w-7xl mx-auto p-4 bg-[#020617] min-h-screen text-slate-100">
                    <header className="glass px-8 py-5 rounded-3xl shadow-xl flex flex-col sm:flex-row items-center justify-between gap-6">
                        <div>
                            <h1 className="text-3xl font-black uppercase tracking-tighter leading-none text-white">Quantum Dynamics</h1>
                            <p className="text-sky-400 text-xs font-bold tracking-[0.2em] mt-2 uppercase">3D Spherical Precession Visualization</p>
                        </div>
                        <div className="flex items-center gap-6 bg-slate-900/50 px-6 py-3 rounded-2xl border border-white/5 shadow-inner">
                            <div className="flex flex-col gap-1">
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">QUANTUM J</span>
                                <input type="range" min="0" max="4" step="1" value={j} 
                                    onChange={(e) => {
                                        const val = parseInt(e.target.value);
                                        setJ(val);
                                        if (mj > val) setMj(val);
                                        if (mj < -val) setMj(-val);
                                    }} 
                                    className="w-40 cursor-pointer accent-sky-500" 
                                />
                            </div>
                            <div className="text-4xl font-black text-sky-400 font-mono w-16 text-center">J={j}</div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">
                        <div className="flex flex-col gap-6 h-full">
                            <div className="glass p-5 rounded-2xl border-sky-500/20 h-[160px]">
                                <h2 className="text-lg font-black text-sky-400 uppercase tracking-widest mb-2">3D Conceptual Visualization</h2>
                                <p className="text-base text-slate-200 mb-1">
                                    Geometric relation between <Katex tex="|L| = \sqrt{J(J+1)} \hbar" /> and <Katex tex="L_z = M_J \hbar" />.
                                </p>
                                <p className="text-xs text-slate-500 italic">Precessing rigid rotor on a quantized shell.</p>
                            </div>
                            <div className="glass p-6 rounded-[32px] flex flex-col relative h-[480px] shadow-2xl overflow-hidden bg-slate-950/20 items-center justify-center">
                                <div className="absolute top-6 left-8 z-10 bg-slate-900/40 p-2 rounded-lg"><h2 className="text-[10px] font-black uppercase tracking-widest text-sky-500/80 font-mono">Spherical Rotor</h2></div>
                                <div className="absolute top-6 right-8 z-10 bg-slate-900/90 p-2 px-4 rounded-xl border border-slate-700/50 shadow-lg font-mono font-black text-emerald-400 text-2xl">{thetaDeg.toFixed(1)}°</div>
                                <canvas ref={canvasRef} className="w-full h-full absolute inset-0"></canvas>
                            </div>
                        </div>

                        <div className="flex flex-col gap-6 h-full">
                            <div className="glass p-5 rounded-2xl border-purple-500/20 h-[160px]">
                                <h2 className="text-lg font-black text-purple-400 uppercase tracking-widest mb-2">Cones of Quantization</h2>
                                <p className="text-base text-slate-200">
                                    <Katex tex="L_z" /> projection and <Katex tex="|L|" /> magnitude symmetry.
                                </p>
                                <div className="mt-3 flex gap-6">
                                    <div className="text-xs text-slate-400 border-l-2 border-white/10 pl-4">
                                        <span className="block font-bold text-white uppercase text-[10px] mb-1">Magnitude</span>
                                        <Katex tex={`|L| = ${q_L_mag.toFixed(3)} \\hbar`} fontSize="1.1rem" />
                                    </div>
                                    <div className="text-xs text-slate-400 border-l-2 border-white/10 pl-4">
                                        <span className="block font-bold text-white uppercase text-[10px] mb-1">Z-Projection</span>
                                        <Katex tex={`L_z = ${mj > 0 ? '+' + mj : mj}.00 \\hbar`} fontSize="1.1rem" />
                                    </div>
                                </div>
                            </div>
                            <div className="glass p-6 rounded-[32px] shadow-2xl flex flex-col h-[480px] overflow-hidden bg-slate-950/40 relative items-center justify-center">
                                <div className="absolute top-6 left-8 z-10 bg-slate-900/40 p-2 rounded-lg"><h2 className="text-[10px] font-black uppercase tracking-widest text-purple-500/80 font-mono">Quantized Cones</h2></div>
                                <svg width="100%" height="100%" viewBox="0 0 300 350" className="overflow-visible flex-1">
                                    <circle cx="150" cy={175} r={130} fill="none" stroke="rgba(56,189,248,0.15)" strokeWidth="1" strokeDasharray="5,5" />
                                    <radialGradient id="sphereGrad" cx="50%" cy="50%" r="50%">
                                        <stop offset="0%" stopColor="rgba(56,189,248,0.08)" />
                                        <stop offset="100%" stopColor="rgba(0,0,0,0)" />
                                    </radialGradient>
                                    <circle cx="150" cy={175} r={130} fill="url(#sphereGrad)" />
                                    <line x1="150" y1="20" x2="150" y2="330" stroke="rgba(255,255,255,0.2)" strokeDasharray="6,6" strokeWidth="2" />
                                    {j > 0 && mjValues.map((m) => {
                                        const scale = 130 / (q_L_mag || 1);
                                        const zPos = 175 - m * scale;
                                        const curRxy = Math.sqrt(Math.max(0, q_L_mag ** 2 - m ** 2)) * scale;
                                        const isSelected = m === mj;
                                        const svgPhi = isVectorLocked ? 0 : precessionPhase;
                                        
                                        // Arrowhead parameters
                                        const endX = 150 + curRxy * Math.cos(svgPhi);
                                        const endY = zPos + curRxy * 0.22 * Math.sin(svgPhi);
                                        const headLen = 22;
                                        const ang = Math.atan2(endY - 175, endX - 150);
                                        const p1x = endX - headLen * Math.cos(ang - Math.PI/7);
                                        const p1y = endY - headLen * Math.sin(ang - Math.PI/7);
                                        const p2x = endX - headLen * Math.cos(ang + Math.PI/7);
                                        const p2y = endY - headLen * Math.sin(ang + Math.PI/7);

                                        return (
                                        <g key={m} onClick={() => setMj(m)} className="cursor-pointer group">
                                            {/* Cone fill - ORIGINAL PURPLE CONES */}
                                            <polygon points={`150,175 ${150 - curRxy},${zPos} ${150 + curRxy},${zPos}`} fill={isSelected ? 'rgba(168, 85, 247, 0.25)' : 'rgba(255,255,255,0.03)'} />
                                            {/* Ellipse base (The Orbit) - FILL REMOVED & COLOR BACK TO PURPLE */}
                                            <ellipse cx="150" cy={zPos} rx={curRxy} ry={curRxy * 0.22} 
                                                     fill="none" 
                                                     stroke={isSelected ? "#a855f7" : "rgba(255,255,255,0.12)"} 
                                                     strokeWidth={isSelected ? 3 : 1} />
                                            {isSelected && (
                                                <g>
                                                    <line x1="150" y1="175" x2={endX} y2={endY} stroke="#38bdf8" strokeWidth="6" />
                                                    <polygon points={`${endX},${endY} ${p1x},${p1y} ${p2x},${p2y}`} fill="#38bdf8" />
                                                </g>
                                            )}
                                            <text x={150 + curRxy + 12} y={zPos + 5} fill={isSelected ? '#d8b4fe' : '#64748b'} fontSize="16" fontWeight="black" className="font-mono">{m > 0 ? `+${m}` : m}</text>
                                        </g>
                                        );
                                    })}
                                    <circle cx="150" cy={175} r={6} fill="#38bdf8" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <footer className="glass p-6 rounded-[32px] flex flex-col md:flex-row items-center justify-between gap-8 shadow-xl mt-auto">
                        <div className="flex flex-wrap gap-3 items-center">
                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest mr-4">Select <Katex tex="M_J" fontSize="0.9rem" />:</span>
                            {mjValues.map((m) => (
                                <button key={m} onClick={() => setMj(m)}
                                    className={`w-14 h-14 rounded-xl font-black text-xl font-mono transition-all flex items-center justify-center ${mj === m ? 'bg-purple-600 text-white shadow-2xl scale-110' : 'bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700'}`}
                                >
                                    {m > 0 ? `+${m}` : m}
                                </button>
                            ))}
                        </div>
                        <div className="flex gap-3 shrink-0">
                            <button onClick={() => setIsVectorLocked(!isVectorLocked)} className={`w-48 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border-2 ${isVectorLocked ? 'bg-emerald-600 border-emerald-400 text-white shadow-emerald-500/20 shadow-2xl' : 'bg-slate-800 border-slate-600 text-slate-400 hover:bg-slate-700'}`}>
                                {isVectorLocked ? 'Axis Locked' : 'Lock Vector'}
                            </button>
                            <button onClick={() => setIsAutoPrecess(!isAutoPrecess)} className="w-32 bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-blue-500/30 shadow-2xl transition-all">
                                {isAutoPrecess ? 'Pause' : 'Play'}
                            </button>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
