    <!-- 
        ========================================================
        CUSTOM METABALL & ESP SHADER
        ========================================================
    -->
    <script id="esp-vertex-shader" type="x-shader/x-vertex">
        uniform vec3 atomPositions[10];
        uniform float atomRadii[10];
        uniform float atomCharges[10];
        uniform int numAtoms;

        varying vec3 vNormal;
        varying float vESP;
        varying vec3 vViewPosition;

        void main() {
            vec3 dir = normalize(position);
            
            float tMin = 0.0;
            float tMax = 6.0; 
            float t = 3.0;
            
            // Binary search to find the isosurface (Metaball threshold)
            for(int i = 0; i < 20; i++) {
                vec3 p = dir * t;
                float density = 0.0;
                
                for(int j = 0; j < 10; j++) {
                    if(j >= numAtoms) break;
                    vec3 dp = p - atomPositions[j];
                    float distSq = dot(dp, dp);
                    float R2 = atomRadii[j] * atomRadii[j] * 1.5; 
                    density += exp(-distSq / R2);
                }
                
                if(density > 0.3) {
                    tMin = t; // Inside
                } else {
                    tMax = t; // Outside
                }
                t = (tMin + tMax) * 0.5;
            }
            
            vec3 surfacePos = dir * t;
            
            // Calculate Analytical Normal
            vec3 grad = vec3(0.0);
            for(int j = 0; j < 10; j++) {
                if(j >= numAtoms) break;
                vec3 dp = surfacePos - atomPositions[j];
                float distSq = dot(dp, dp);
                float R2 = atomRadii[j] * atomRadii[j] * 1.5;
                float factor = exp(-distSq / R2);
                grad += factor * (-2.0 * dp / R2);
            }
            vec3 objectNormal = normalize(-grad);
            vNormal = normalize(normalMatrix * objectNormal);
            
            // Calculate Exact Electrostatic Potential (V) at the surface
            float V = 0.0;
            for(int j = 0; j < 10; j++) {
                if(j >= numAtoms) break;
                float r = distance(surfacePos, atomPositions[j]);
                V += atomCharges[j] / (r + 0.05); 
            }
            vESP = V;
            
            vec4 mvPosition = modelViewMatrix * vec4(surfacePos, 1.0);
            vViewPosition = -mvPosition.xyz;
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="esp-fragment-shader" type="x-shader/x-fragment">
        uniform float colorScale; // Used to amplify weak signals like Octupole
        
        varying vec3 vNormal;
        varying float vESP;
        varying vec3 vViewPosition;

        void main() {
            // Amplify and clamp the potential
            float v = vESP * colorScale;
            
            // Use smoothstep to aggressively push colors outwards and remove the blurry white deadzone
            float mag = smoothstep(0.05, 0.9, abs(v));
            
            // Vibrant colors
            vec3 colorBlue = vec3(0.1, 0.35, 0.95);   // Negative (灌-)
            vec3 colorWhite = vec3(0.95, 0.95, 0.95); // Neutral
            vec3 colorRed = vec3(0.95, 0.15, 0.25);   // Positive (灌+)
            
            vec3 baseColor;
            if (v < 0.0) {
                // Negative -> Blue
                baseColor = mix(colorWhite, colorBlue, mag);
            } else {
                // Positive -> Red
                baseColor = mix(colorWhite, colorRed, mag);
            }
            
            // Improved Lighting to avoid washing out the colors
            vec3 normal = normalize(vNormal);
            vec3 viewDir = normalize(vViewPosition);
            
            vec3 lightDir1 = normalize(vec3(1.0, 1.0, 1.5));
            float diff1 = max(dot(normal, lightDir1), 0.0);
            
            vec3 lightDir2 = normalize(vec3(-1.0, -0.5, 0.5));
            float diff2 = max(dot(normal, lightDir2), 0.0);
            
            // Specular reflection
            vec3 halfVector = normalize(lightDir1 + viewDir);
            float NdotH = max(0.0, dot(normal, halfVector));
            float specular = pow(NdotH, 64.0) * 0.35; // Lower intensity so colors remain deep
            
            // Ambient tinted by baseColor to prevent grey wash-out
            vec3 ambient = baseColor * 0.4;
            vec3 finalColor = baseColor * (diff1 * 0.8 + diff2 * 0.2) + ambient + vec3(specular);
            
            // Subtle Rim lighting
            float rim = 1.0 - max(dot(viewDir, normal), 0.0);
            rim = smoothstep(0.7, 1.0, rim);
            finalColor += baseColor * rim * 0.3;
            
            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script>
        // CPK Colors (for structure mode)
        const COLOR_H = 0xeeeeee;
        const COLOR_C = 0x333333;
        const COLOR_O = 0xef4444;
        const COLOR_CL = 0x10b981;
        const COLOR_NA = 0x8b5cf6;

        // Math helper for Tetrahedron (CH4)
        // Increased radius to make Hydrogen 'lobes' more pronounced visually
        const tetR = 1.6; 
        const tetC = tetR / Math.sqrt(3);

        /* Molecule Data
           radius: Size of the electron cloud bubble.
           charge: Physical partial charge value (Red: >0, Blue: <0).
           colorScale: Multipole amplification factor to fix the "white blur" issue for higher orders.
        */
        const modelData = {
            'na': {
                title: '나트륨 이온 (Na⁺)',
                subtitle: '완벽한 단극자 (Monopole)',
                desc: '나트륨 이온은 전자를 하나 잃어 <strong>전체 전하량이 +1</strong>인 상태입니다. 전자구름이 한쪽으로 치우친 경우가 아니라, 전체 양전하가 남아 있는 경우를 보여줍니다.',
                equation: 'V(r) \\approx \\frac{1}{4\\pi\\epsilon_0} \\frac{q}{r}',
                colorScale: 0.8,
                atoms: [
                    { name: 'Na⁺', pos: [0, 0, 0], radius: 1.5, color: COLOR_NA, charge: 1.0, labelPos: [0, 1.9, 0] }
                ],
                bonds: []
            },
            'hcl': {
                title: '염화수소 (HCl)',
                subtitle: '영구 이극자 (Dipole)',
                desc: '전기음성도가 큰 염소 쪽으로 전자구름이 치우치면서 한쪽 끝은 δ−, 반대쪽 끝은 δ+로 갈립니다. 표면 전하 비대칭이 곧 영구 쌍극자를 만듭니다.',
                equation: 'V(r) \\approx \\frac{1}{4\\pi\\epsilon_0} \\frac{\\mathbf{p} \\cdot \\hat{\\mathbf{r}}}{r^2}',
                colorScale: 1.5,
                atoms: [
                    { name: 'H (δ+)', pos: [0, 1.2, 0], radius: 0.8, color: COLOR_H, charge: 1.0, labelPos: [0.9, 1.4, 0] },
                    { name: 'Cl (δ−)', pos: [0, -0.5, 0], radius: 1.5, color: COLOR_CL, charge: -1.0, labelPos: [1.7, -0.6, 0] }
                ],
                bonds: [ [0, 1] ]
            },
            'co2': {
                title: '이산화탄소 (CO₂)',
                subtitle: '선형 사극자 (Linear Quadrupole)',
                desc: '양끝 산소는 δ−, 중앙 탄소는 δ+입니다. 각 결합은 극성이지만 선형 대칭 때문에 전체 쌍극자 모멘트는 0이고, 더 높은 차수의 사극자 성분이 남습니다.',
                equation: 'V(r) \\approx \\frac{1}{4\\pi\\epsilon_0} \\frac{Q_{zz}}{2r^3} (3\\cos^2\\theta - 1)',
                colorScale: 3.0,
                atoms: [
                    { name: 'O (δ−)', pos: [-1.4, 0, 0], radius: 1.15, color: COLOR_O, charge: -1.0, labelPos: [-1.5, 1.5, 0] },
                    { name: 'C (2δ+)', pos: [0, 0, 0], radius: 1.0, color: COLOR_C, charge: 2.0, labelPos: [0, 1.5, 0] },
                    { name: 'O (δ−)', pos: [1.4, 0, 0], radius: 1.15, color: COLOR_O, charge: -1.0, labelPos: [1.5, 1.5, 0] }
                ],
                bonds: [ [0, 1], [1, 2] ]
            },
            'ch4': {
                title: '메탄 (CH₄)',
                subtitle: '사면체 팔극자 (Tetrahedral Octupole)',
                desc: '각 C-H 결합은 약한 극성을 가지지만, 분자 전체는 정사면체 대칭이라 표면 전위가 거의 상쇄됩니다. 그래서 영구 쌍극자보다 더 높은 차수의 다중극자로 이해해야 합니다.',
                equation: 'V(r) \\propto \\frac{1}{r^4}',
                colorScale: 15.0,
                atoms: [
                    { name: 'C (δ−)', pos: [0, 0, 0], radius: 1.2, color: COLOR_C, charge: -1.2, labelPos: [-1.8, 0, 0] },
                    { name: 'H (δ+)', pos: [tetC, tetC, tetC], radius: 0.9, color: COLOR_H, charge: 0.3, labelPos: [tetC+1.0, tetC+1.0, tetC] },
                    { name: 'H (δ+)', pos: [-tetC, -tetC, tetC], radius: 0.9, color: COLOR_H, charge: 0.3, labelPos: [-tetC-1.0, -tetC-1.0, tetC] },
                    { name: 'H (δ+)', pos: [-tetC, tetC, -tetC], radius: 0.9, color: COLOR_H, charge: 0.3, labelPos: [-tetC-1.0, tetC+1.0, -tetC] },
                    { name: 'H (δ+)', pos: [tetC, -tetC, -tetC], radius: 0.9, color: COLOR_H, charge: 0.3, labelPos: [tetC+1.0, -tetC-1.0, -tetC] }
                ],
                bonds: [ [0, 1], [0, 2], [0, 3], [0, 4] ]
            }
        };

        let currentViewMode = 'esp'; 
        let currentMolecule = 'hcl';

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(0, 0, 8.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        controls.enablePan = false;
        controls.minDistance = 3;
        controls.maxDistance = 15;

        // Lighting (Used for structure mode)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        let moleculeGroup = new THREE.Group();
        scene.add(moleculeGroup);

        // Function to create text sprites for atom labels
        function createTextSprite(message) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            
            context.font = "Bold 48px 'Inter', Arial";
            context.fillStyle = "rgba(15, 23, 42, 0.9)"; // Much darker slate for high contrast
            context.textAlign = "center";
            context.fillText(message, 128, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2.5, 1.25, 1);
            return sprite;
        }

        function setViewMode(mode) {
            currentViewMode = mode;
            
            document.getElementById('btn-mode-structure').classList.remove('active');
            document.getElementById('btn-mode-esp').classList.remove('active');
            document.getElementById(`btn-mode-${mode}`).classList.add('active');

            buildMolecule(currentMolecule);
        }

        // --- Render Functions ---
        function buildMolecule(type) {
            while(moleculeGroup.children.length > 0){ 
                moleculeGroup.remove(moleculeGroup.children[0]); 
            }

            const data = modelData[type];

            if (currentViewMode === 'esp') {
                // ==========================================
                // ESP Surface Mode (Metaballs + Shader)
                // ==========================================
                
                const espUniforms = {
                    atomPositions: { value: Array(10).fill(new THREE.Vector3()) },
                    atomRadii: { value: Array(10).fill(0.0) },
                    atomCharges: { value: Array(10).fill(0.0) },
                    numAtoms: { value: data.atoms.length },
                    colorScale: { value: data.colorScale || 1.0 } // Pass the amplification factor!
                };
                
                data.atoms.forEach((a, i) => {
                    espUniforms.atomPositions.value[i] = new THREE.Vector3(...a.pos);
                    espUniforms.atomRadii.value[i] = a.radius;
                    espUniforms.atomCharges.value[i] = a.charge;
                });

                const espMaterial = new THREE.ShaderMaterial({
                    vertexShader: document.getElementById('esp-vertex-shader').textContent,
                    fragmentShader: document.getElementById('esp-fragment-shader').textContent,
                    uniforms: espUniforms,
                    transparent: false
                });

                const highResSphere = new THREE.SphereGeometry(4.0, 128, 128); 
                const blobMesh = new THREE.Mesh(highResSphere, espMaterial);
                
                moleculeGroup.add(blobMesh);

                // Add Labels floating around the blob
                data.atoms.forEach((atom) => {
                    if(atom.labelPos) {
                        const sprite = createTextSprite(atom.name);
                        sprite.position.set(...atom.labelPos);
                        sprite.position.multiplyScalar(1.2); 
                        moleculeGroup.add(sprite);
                    }
                });

            } else {
                // ==========================================
                // Structure Mode (Ball & Stick)
                // ==========================================
                const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
                const atomMeshes = [];

                data.atoms.forEach((atom) => {
                    const pos = new THREE.Vector3(...atom.pos);
                    const atomMat = new THREE.MeshPhysicalMaterial({ 
                        color: atom.color, metalness: 0.1, roughness: 0.3, clearcoat: 0.8
                    });
                    const atomMesh = new THREE.Mesh(sphereGeo, atomMat);
                    atomMesh.scale.setScalar(atom.radius * 0.5);
                    atomMesh.position.copy(pos);
                    
                    moleculeGroup.add(atomMesh);
                    atomMeshes.push(atomMesh);

                    if(atom.labelPos) {
                        const sprite = createTextSprite(atom.name);
                        sprite.position.set(...atom.labelPos);
                        moleculeGroup.add(sprite);
                    }
                });

                // Build Bonds
                const bondMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.4, roughness: 0.5 });
                data.bonds.forEach((bond) => {
                    const p1 = new THREE.Vector3(...data.atoms[bond[0]].pos);
                    const p2 = new THREE.Vector3(...data.atoms[bond[1]].pos);
                    
                    const distance = p1.distanceTo(p2);
                    const cylinderGeo = new THREE.CylinderGeometry(0.12, 0.12, distance, 16);
                    const cylinder = new THREE.Mesh(cylinderGeo, bondMat);
                    
                    const midPoint = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
                    cylinder.position.copy(midPoint);
                    
                    cylinder.quaternion.setFromUnitVectors(
                        new THREE.Vector3(0, 1, 0),
                        new THREE.Vector3().subVectors(p2, p1).normalize()
                    );
                    
                    if (type === 'co2') {
                        const offset = new THREE.Vector3(0, 0, 0.2).applyQuaternion(camera.quaternion);
                        const cyl1 = cylinder.clone(); cyl1.position.add(offset); moleculeGroup.add(cyl1);
                        const cyl2 = cylinder.clone(); cyl2.position.sub(offset); moleculeGroup.add(cyl2);
                    } else {
                        moleculeGroup.add(cylinder);
                    }
                });
            }

            moleculeGroup.rotation.set(0, 0, 0);
            moleculeGroup.scale.set(0.01, 0.01, 0.01);
        }

        // --- Interaction ---
        window.selectModel = function(type, btnElement) {
            currentMolecule = type;

            btnElement.classList.add('active');

            updateInfoPanel(type);
            buildMolecule(type);

        // Handle Window Resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        controls.addEventListener('start', () => { controls.autoRotate = false; });
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            if(moleculeGroup.scale.x < 1) {
                const s = moleculeGroup.scale.x + (1 - moleculeGroup.scale.x) * 0.1;
                moleculeGroup.scale.set(s, s, s);
            }

            renderer.render(scene, camera);
        }

        // Initialization
        selectModel('hcl', document.querySelectorAll('.tab-btn')[1]);
        animate();
